<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MONARKA</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at center, #050510, #000);
    font-family: Arial, sans-serif;
    color: #4a6cff;
    overflow: hidden;
}

/* TOP LOGO */
.top-logo {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    width: 400px;
    filter: drop-shadow(0 0 15px #4a6cff);
}

/* CENTER SYSTEM */
.system {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* ORBIT CONTAINER */
.orbit {
    width: 250px;
    height: 200px;
    position: relative;
    animation: spin 8s linear infinite;
}

/* ROTATING LOGO */
.orbit img {
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 200px;
    filter: drop-shadow(0 0 12px #4a6cff);
}

/* ROTATION */
@keyframes spin {
    100% { transform: rotate(360deg); }
}

/* PROGRESS BAR */
.bar {
    width: 220px;
    height: 2px;
    background: #111;
    margin: 40px auto 10px;
    overflow: hidden;
}

.progress {
    width: 0%;
    height: 100%;
    background: #4a6cff;
    animation: loop 3s linear infinite;
}

@keyframes loop {
    0% { width: 0%; }
    50% { width: 100%; }
    100% { width: 0%; }
}

/* STATUS TEXT */
.status {
    text-align: center;
    font-size: 13px;
    color: #000000;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<!-- 🔥 TOP LOGO -->
<img src="monarka/ChatGPT Image Apr 20, 2026, 01_44_40 AM.png" class="top-logo" alt="MONARKA">

<div class="system">

    <!-- 🔄 ORBITING LOGO -->
    <div class="orbit">
        <img src="monarka/ChatGPT Image Apr 5, 2026, 03_59_26 PM.png" alt="orbit logo">
    </div>

    <!-- PROGRESS -->
    <div class="bar">
        <div class="progress"></div>
    </div>

    <div class="status" id="status"></div>

</div>

<script>
const messages = [
    "INITIALIZING SYSTEM",
    "LOADING MODULES",
    "CALIBRATING CORE",
    "SYNCING DATA",
    "SYSTEM ACTIVE"
];

let i = 0;
const status = document.getElementById("status");

function updateStatus() {
    status.textContent = messages[i];
    i = (i + 1) % messages.length;
}

setInterval(updateStatus, 1200);
updateStatus();
</script>

</body>
</html>
